<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アマドのQRメーカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --ink: #4a3f4c;
    --paper: #fdf7f4;
    --card: #ffffff;
    --accent: #e88fa2;
    --accent-dark: #d4718a;
    --muted: #a99aab;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }
  header { width: 100%; max-width: 460px; margin-bottom: 14px; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.18em;
    color: var(--accent-dark); font-weight: 700; margin-bottom: 2px;
  }
  h1 { font-size: 24px; font-weight: 800; }
  h1 span { color: var(--accent-dark); }
  .card {
    width: 100%; max-width: 460px;
    background: var(--card); border-radius: 20px; padding: 18px;
    box-shadow: 0 4px 24px rgba(74,63,76,0.10);
  }
  .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type="url"] {
    flex: 1; font-size: 16px; padding: 14px;
    border: 2px solid #f0e2e6; border-radius: 12px; outline: none; min-width: 0;
  }
  input[type="url"]:focus { border-color: var(--accent); }
  .btn {
    border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
    cursor: pointer; padding: 14px 18px;
    transition: transform .08s ease, background .15s ease;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--accent); color: #fff; width: 100%;
    padding: 16px; font-size: 17px;
  }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-paste { background: #fbeef1; color: var(--accent-dark); flex-shrink: 0; }
  .error { display: none; margin-top: 10px; color: #c0504a; font-size: 14px; font-weight: 600; }

  #stage-wrap { display: none; margin-top: 18px; }
  #stage-wrap.show { display: block; animation: pop .4s ease; }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.94); }
    to   { opacity: 1; transform: scale(1); }
  }
  #stage {
    position: relative; width: 100%;
    border-radius: 16px; overflow: hidden;
  }
  #stage img.bg { width: 100%; display: block; }
  #qrcode {
    position: absolute;
    left: 49.8%; top: 62.2%;
    width: 23.7%; aspect-ratio: 1/1;
  }
  #qrcode img, #qrcode canvas { width: 100% !important; height: 100% !important; display: block; }
  .url-preview {
    margin-top: 10px; font-size: 12px; color: var(--muted);
    word-break: break-all; text-align: center;
  }
  .btn-download {
    margin-top: 14px; background: var(--ink); color: #fff;
    width: 100%; padding: 15px;
  }
  footer { margin-top: 24px; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-align: center; }
  footer .netlify { display: block; margin-top: 6px; font-size: 10px; }
  footer .netlify a { color: var(--muted); text-decoration: none; border-bottom: 1px dotted var(--muted); }
  footer .netlify a:hover { color: var(--accent-dark); border-color: var(--accent-dark); }
  @media (prefers-reduced-motion: reduce) { #stage-wrap.show { animation: none; } }
</style>
</head>

  <h1>アマドの<span>QRメーカー</span></h1>

<script>
  const input = document.getElementById('url-input');
  const genBtn = document.getElementById('gen-btn');
  const pasteBtn = document.getElementById('paste-btn');
  const dlBtn = document.getElementById('dl-btn');
  const wrap = document.getElementById('stage-wrap');
  const qrBox = document.getElementById('qrcode');
  const bgImg = document.getElementById('bg-img');
  const preview = document.getElementById('url-preview');
  const errMsg = document.getElementById('error-msg');

  // 看板内のQR位置(元画像に対する比率)
  const QR_X = 0.498, QR_Y = 0.622, QR_W = 0.237;

  function generate() {
    let url = input.value.trim();
    if (!url) {
      errMsg.style.display = 'block';
      wrap.classList.remove('show');
      return;
    }
    if (!/^https?:\/\//i.test(url)) {
      url = 'https://' + url;
      input.value = url;
    }
    errMsg.style.display = 'none';
    qrBox.innerHTML = '';
    new QRCode(qrBox, {
      text: url,
      width: 480,
      height: 480,
      colorDark: '#4a3f4c',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    preview.textContent = url;
    wrap.classList.remove('show');
    void wrap.offsetWidth;
    wrap.classList.add('show');
  }

  genBtn.addEventListener('click', generate);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

  pasteBtn.addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      if (text) { input.value = text.trim(); generate(); }
    } catch (e) {
      input.focus();
      errMsg.textContent = '貼付けできない場合は長押しでペーストしてください';
      errMsg.style.display = 'block';
      setTimeout(() => {
        errMsg.style.display = 'none';
        errMsg.textContent = 'URLを入力してください';
      }, 3000);
    }
  });

  dlBtn.addEventListener('click', () => {
    const qrImg = qrBox.querySelector('img');
    const qrCanvas = qrBox.querySelector('canvas');
    const qrSrc = qrImg && qrImg.src ? qrImg : qrCanvas;
    if (!qrSrc) return;

    const w = bgImg.naturalWidth, h = bgImg.naturalHeight;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bgImg, 0, 0, w, h);
    const qw = QR_W * w;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(qrSrc, QR_X * w, QR_Y * h, qw, qw);

    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'amado-qr.png';
    a.click();
  });
</script>
